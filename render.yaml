services:
  - type: web
    name: nutriperu
    runtime: python
    buildCommand: pip install -r webapp/requirements.txt
    startCommand: uvicorn webapp.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutriperu-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: nutriperu-db
    databaseName: nutriperu
    plan: free
